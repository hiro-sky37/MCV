<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#f7efe5">
  <title>MameCompress Vision</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="hero">
    <div class="hero__text">
      <p class="eyebrow">Static-site perceptual image compressor</p>
      <h1>MameCompress Vision</h1>
      <p class="lead">顔・人物・手動で囲った部分を鮮明に残し、背景を強めに圧縮します。ファイルはサーバーに送信されません。</p>
    </div>
    <div class="privacy-card">
      <strong>処理場所</strong>
      <span>100% ブラウザ内</span>
      <small>GitHub Pagesなどの静的ホスティングで動作します。</small>
    </div>
  </header>

  <main class="layout">
    <section class="panel upload-panel" aria-labelledby="upload-title">
      <h2 id="upload-title">1. 画像を追加</h2>
      <label id="dropZone" class="drop-zone">
        <input id="fileInput" type="file" accept="image/*" multiple>
        <span class="drop-zone__icon">＋</span>
        <span class="drop-zone__title">画像を選択 / ドロップ</span>
        <span class="drop-zone__note">JPEG / PNG / WebP など。動画・PDFは今後拡張用。</span>
      </label>
      <div id="supportList" class="support-list"></div>
      <div id="fileList" class="file-list" aria-live="polite"></div>
    </section>

    <section class="panel settings-panel" aria-labelledby="settings-title">
      <h2 id="settings-title">2. 圧縮設定</h2>

      <div class="preset-grid" role="group" aria-label="圧縮プリセット">
        <button class="preset active" data-preset="balanced" type="button">
          <strong>おすすめ</strong><span>顔を保護・背景を自然に圧縮</span>
        </button>
        <button class="preset" data-preset="face" type="button">
          <strong>顔優先</strong><span>顔周辺を広めに保護</span>
        </button>
        <button class="preset" data-preset="max" type="button">
          <strong>最大圧縮</strong><span>背景をかなり強く削減</span>
        </button>
        <button class="preset" data-preset="manual" type="button">
          <strong>手動ROI</strong><span>囲った部分を最優先</span>
        </button>
      </div>

      <div class="setting-row">
        <label for="formatSelect">出力形式</label>
        <select id="formatSelect">
          <option value="image/webp">WebP（推奨）</option>
          <option value="image/jpeg">JPEG</option>
          <option value="image/png">PNG（大きめ）</option>
        </select>
      </div>

      <div class="setting-row">
        <label for="qualityRange">最終画質 <output id="qualityValue">82</output></label>
        <input id="qualityRange" type="range" min="40" max="95" value="82">
      </div>

      <div class="setting-row">
        <label for="backgroundRange">背景圧縮の強さ <output id="backgroundValue">62</output></label>
        <input id="backgroundRange" type="range" min="0" max="100" value="62">
      </div>

      <div class="setting-row">
        <label for="protectRange">保護範囲の広さ <output id="protectValue">32</output></label>
        <input id="protectRange" type="range" min="0" max="80" value="32">
      </div>

      <div class="setting-row">
        <label for="maxEdge">最大長辺</label>
        <select id="maxEdge">
          <option value="0">元サイズ維持</option>
          <option value="2400" selected>2400px</option>
          <option value="2048">2048px</option>
          <option value="1600">1600px</option>
          <option value="1280">1280px</option>
        </select>
      </div>

      <div class="check-row">
        <label><input id="autoFace" type="checkbox" checked> JS顔検出を使う</label>
        <label><input id="autoSaliency" type="checkbox" checked> 簡易注目領域を保護</label>
        <label><input id="stripMeta" type="checkbox" checked> メタデータを削除</label>
      </div>

      <div class="actions">
        <button id="analyzeBtn" class="secondary" type="button">自動解析</button>
        <button id="compressBtn" class="primary" type="button">圧縮開始</button>
      </div>
      <p id="statusText" class="status-text">画像を追加してください。</p>
    </section>

    <section class="panel preview-panel" aria-labelledby="preview-title">
      <div class="panel-title-row">
        <h2 id="preview-title">3. 保護領域プレビュー</h2>
        <button id="clearRegionsBtn" class="ghost" type="button">手動範囲を消す</button>
      </div>
      <p class="hint">キャンバス上でドラッグすると、鮮明に残す範囲を手動追加できます。</p>
      <div class="canvas-wrap">
        <canvas id="previewCanvas" width="960" height="540" aria-label="プレビュー"></canvas>
      </div>
      <div class="legend">
        <span><i class="legend-face"></i> 自動保護</span>
        <span><i class="legend-manual"></i> 手動保護</span>
      </div>
    </section>

    <section class="panel result-panel" aria-labelledby="result-title">
      <h2 id="result-title">4. 結果</h2>
      <div id="resultList" class="result-list"></div>
    </section>
  </main>

  <template id="fileItemTemplate">
    <button class="file-item" type="button">
      <span class="file-name"></span>
      <span class="file-meta"></span>
    </button>
  </template>

  <template id="resultTemplate">
    <article class="result-card">
      <div>
        <h3></h3>
        <p class="result-meta"></p>
      </div>
      <div class="result-actions">
        <a class="download-link" download>ダウンロード</a>
      </div>
    </article>
  </template>

  <script src="js/app.js"></script>
</body>
</html>
